<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#F7F3EC">
<title>Modern Frame · สั่งอาหาร</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=IBM+Plex+Sans+Thai:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F7F3EC; --card:#FFFDF8; --ink:#2B2018; --ink-soft:#7A6B5A;
    --line:#E6DBC9; --line-soft:#EFE7D9; --accent:#A9714B; --accent-deep:#83532F;
    --milk:#F1EADD; --ok:#3E6E54; --ok-bg:#E4EFE7; --r:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:#EAE3D6;color:var(--ink);font-family:"IBM Plex Sans Thai",system-ui,sans-serif;font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--cream);position:relative;display:flex;flex-direction:column;border-left:1px solid var(--line);border-right:1px solid var(--line)}
  .mono{font-family:"IBM Plex Mono",monospace}
  .frame-word{font-family:"Fraunces",serif;font-weight:500;letter-spacing:.3px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea{font-family:inherit;font-size:16px}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  header{position:sticky;top:0;z-index:20;background:var(--cream);padding:14px 18px 10px;border-bottom:1px solid var(--line-soft)}
  .topline{display:flex;align-items:center;justify-content:space-between}
  .brand{display:flex;flex-direction:column;line-height:1.1}
  .brand .name{font-size:21px}
  .brand .sub{font-size:11px;color:var(--ink-soft);letter-spacing:2.5px;text-transform:uppercase;margin-top:2px}
  .table-badge{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--accent-deep);background:var(--milk);border:1px solid var(--line);padding:6px 12px;border-radius:999px;white-space:nowrap}
  .table-badge b{font-weight:600}
  .cats{display:flex;gap:8px;overflow-x:auto;padding:12px 18px 4px;scrollbar-width:none}
  .cats::-webkit-scrollbar{display:none}
  .cat{flex:0 0 auto;padding:8px 15px;border-radius:999px;font-size:14px;color:var(--ink-soft);background:transparent;border:1px solid var(--line);transition:.15s}
  .cat.on{background:var(--ink);color:var(--cream);border-color:var(--ink)}
  main{flex:1;padding:14px 18px 130px}
  .group-h{font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);margin:18px 0 10px}
  .group-h:first-child{margin-top:4px}
  .item{display:flex;gap:14px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px;margin-bottom:10px;text-align:left;width:100%;transition:.12s}
  .item:active{transform:scale(.99)}
  .thumb{width:66px;height:66px;flex:0 0 auto;border-radius:10px;background:var(--milk);overflow:hidden;border:1px solid var(--line-soft)}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .item .body{flex:1;min-width:0}
  .item .nm{font-size:15px;font-weight:500;display:flex;align-items:center;gap:6px}
  .tag{font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--accent-deep);background:var(--milk);padding:2px 7px;border-radius:6px}
  .item .ds{font-size:12.5px;color:var(--ink-soft);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item .pr{font-size:14px;margin-top:6px;font-weight:500}
  .plus{width:34px;height:34px;flex:0 0 auto;border-radius:50%;background:var(--ink);color:var(--cream);display:flex;align-items:center;justify-content:center;font-size:20px;align-self:center}
  .qbubble{background:var(--accent)}
  .cartbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:12px 16px calc(12px + env(safe-area-inset-bottom));z-index:30;background:linear-gradient(to top,var(--cream) 70%,transparent)}
  .cartbar-inner{display:flex;align-items:center;gap:12px;background:var(--ink);color:var(--cream);border-radius:14px;padding:13px 16px;width:100%}
  .cartbar .count{background:var(--cream);color:var(--ink);border-radius:8px;min-width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
  .cartbar .lbl{flex:1;font-size:15px;text-align:left}
  .cartbar .tot{font-size:15px;font-weight:500}
  .hidden{display:none !important}
  .sheet-wrap{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;justify-content:flex-end;background:rgba(43,32,24,.4)}
  .sheet{background:var(--cream);width:100%;max-width:430px;margin:0 auto;border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;animation:up .22s ease}
  @keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @media(prefers-reduced-motion:reduce){.sheet{animation:none}}
  .sheet-head{position:sticky;top:0;background:var(--cream);display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;border-bottom:1px solid var(--line-soft)}
  .sheet-head h2{font-size:18px;margin:0;font-weight:600}
  .x{width:34px;height:34px;border-radius:50%;background:var(--milk);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--ink-soft)}
  .sheet-body{padding:18px}
  .hero{width:100%;height:200px;object-fit:cover;border-radius:12px;display:block}
  .opt-label{font-size:13px;color:var(--ink-soft);margin:16px 0 8px;letter-spacing:.5px}
  .opts{display:flex;gap:8px;flex-wrap:wrap}
  .opt{padding:9px 16px;border-radius:10px;border:1px solid var(--line);background:var(--card);font-size:14px}
  .opt.on{border-color:var(--ink);background:var(--ink);color:var(--cream)}
  .qty{display:flex;align-items:center;gap:18px;justify-content:center;margin-top:6px}
  .qbtn{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:var(--card);font-size:22px;display:flex;align-items:center;justify-content:center}
  .qnum{font-size:20px;min-width:28px;text-align:center;font-weight:500}
  .note{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;resize:none;background:var(--card);color:var(--ink)}
  .cta{width:100%;background:var(--ink);color:var(--cream);border-radius:13px;padding:15px;font-size:16px;font-weight:500;margin-top:18px;display:flex;justify-content:space-between;align-items:center}
  .cta.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .crow{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line-soft)}
  .crow .info{flex:1}
  .crow .cnm{font-size:15px;font-weight:500}
  .crow .copt{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .crow .cnote{font-size:12px;color:var(--accent-deep);margin-top:3px}
  .crow .cside{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:8px}
  .stepper{display:flex;align-items:center;gap:12px}
  .sbtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--card);font-size:17px;display:flex;align-items:center;justify-content:center}
  .sumrow{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;color:var(--ink-soft)}
  .sumrow.total{font-size:18px;font-weight:600;color:var(--ink);border-top:1px solid var(--line);margin-top:8px;padding-top:14px}
  .done{text-align:center;padding:50px 24px 40px}
  .check{width:72px;height:72px;border-radius:50%;background:var(--ok-bg);color:var(--ok);display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 18px}
  .steps{text-align:left;max-width:270px;margin:26px auto 0}
  .step{display:flex;gap:14px;align-items:center;margin-bottom:18px}
  .sdot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 auto}
  .sdot.done{background:var(--ink);color:var(--cream)}
  .sdot.now{background:#F6E6CF;color:var(--accent-deep)}
  .sdot.wait{background:var(--milk);color:var(--ink-soft)}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--cream);padding:10px 18px;border-radius:999px;font-size:13px;z-index:60;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
  .icon{font-style:normal}
  .demo-note{background:#83532F;color:#fff;font-size:12px;text-align:center;padding:7px 12px;line-height:1.4}
</style>

<script>
  // เชื่อม Firebase ถ้าตั้งค่าแล้ว — ถ้ายังไม่ตั้งค่าจะรันเป็น "เดโม" (ออเดอร์ไม่ถูกส่งจริง)
  window.__db = null; window.__configured = false;
  (function(){
    var cfg = window.FIREBASE_CONFIG || {};
    var ready = cfg.apiKey && String(cfg.apiKey).indexOf("PASTE") === -1 && cfg.databaseURL && String(cfg.databaseURL).indexOf("PASTE") === -1;
    if(ready){
      try{ firebase.initializeApp(cfg); window.__db = firebase.database(); window.__configured = true; }
      catch(e){ console.error("เชื่อม Firebase ไม่สำเร็จ:", e); }
    }
  })();
</script>

const TEMPS=["ร้อน","เย็น","ปั่น"];
const SWEETS=["หวานปกติ","หวานน้อย","ไม่หวาน"];
let activeCat="all";
let cart=[];
const params=new URLSearchParams(location.search);
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
const rawTable=params.get("table");
const table=rawTable?String(rawTable).replace(/[^\w฀-๿-]/g,"").slice(0,12):null; // กันอักขระแปลก/XSS
document.getElementById("tableNo").textContent=table?table:"—";

const catsEl=document.getElementById("cats");
const catList=[["all","ทั้งหมด"],["food","อาหาร"],["drink","เครื่องดื่ม"]];
catsEl.innerHTML=catList.map(([k,l])=>`<button class="cat${k==='all'?' on':''}" data-cat="${k}">${l}</button>`).join("");
catsEl.querySelectorAll(".cat").forEach(b=>b.onclick=()=>{activeCat=b.dataset.cat;catsEl.querySelectorAll(".cat").forEach(x=>x.classList.toggle("on",x===b));renderMenu();});

const menuEl=document.getElementById("menu");
function qtyOf(id){return cart.filter(c=>c.id===id).reduce((s,c)=>s+c.qty,0);}
function renderMenu(){
  let html="";
  if(activeCat==="all"){
    ["food","drink"].forEach(cat=>{
      const grp=MENU.filter(m=>m.cat===cat);
      if(grp.length) html+=`<div class="group-h">${CAT[cat]}</div>`+grp.map(card).join("");
    });
  }else html=MENU.filter(m=>m.cat===activeCat).map(card).join("");
  menuEl.innerHTML=html;
  menuEl.querySelectorAll(".item").forEach(el=>el.onclick=()=>openItem(el.dataset.id));
}
function card(m){
  const q=qtyOf(m.id);
  return `<button class="item" data-id="${m.id}">
    <span class="thumb"><img src="${m.img}" alt="${m.nm}"></span>
    <span class="body">
      <span class="nm">${m.nm}${m.pop?'<span class="tag">แนะนำ</span>':''}</span>
      <span class="ds">${m.ds}</span>
      <span class="pr mono">฿${m.pr}</span>
    </span>
    <span class="plus${q?' qbubble':''}">${q?q:'+'}</span>
  </button>`;
}
let sheet=null;
function closeSheet(){if(sheet){sheet.remove();sheet=null;}}
function openItem(id){
  const m=MENU.find(x=>x.id===id);
  let temp=m.drink?"เย็น":null,sweet=m.drink?"หวานปกติ":null,qty=1,note="";
  sheet=document.createElement("div");sheet.className="sheet-wrap";
  function draw(){
    sheet.innerHTML=`<div class="sheet">
      <div class="sheet-head"><h2>${m.nm}</h2><button class="x" aria-label="ปิด">×</button></div>
      <div class="sheet-body">
        <img class="hero" src="${m.img}" alt="${m.nm}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
          <div style="font-size:13px;color:var(--ink-soft);flex:1;padding-right:10px">${m.ds}</div>
          <div class="mono" style="font-size:18px;font-weight:500">฿${m.pr}</div>
        </div>
        ${m.drink?`
        <div class="opt-label">อุณหภูมิ</div>
        <div class="opts" id="tempOpts">${TEMPS.map(t=>`<button class="opt${t===temp?' on':''}" data-t="${t}">${t}</button>`).join("")}</div>
        <div class="opt-label">ความหวาน</div>
        <div class="opts" id="sweetOpts">${SWEETS.map(s=>`<button class="opt${s===sweet?' on':''}" data-s="${s}">${s}</button>`).join("")}</div>`:""}
        <div class="opt-label">หมายเหตุถึงครัว (ถ้ามี)</div>
        <textarea class="note" id="noteIn" rows="2" placeholder="เช่น ไม่ใส่ผัก, เผ็ดน้อย">${esc(note)}</textarea>
        <div class="opt-label" style="text-align:center">จำนวน</div>
        <div class="qty"><button class="qbtn" id="dec" aria-label="ลด">−</button><span class="qnum" id="qn">${qty}</span><button class="qbtn" id="inc" aria-label="เพิ่ม">+</button></div>
        <button class="cta" id="addBtn"><span>เพิ่มลงตะกร้า</span><span class="mono">฿${m.pr*qty}</span></button>
      </div></div>`;
    bind();
  }
  function bind(){
    sheet.querySelector(".x").onclick=closeSheet;
    sheet.onclick=e=>{if(e.target===sheet)closeSheet();};
    const noteIn=sheet.querySelector("#noteIn");
    noteIn.oninput=e=>note=e.target.value;
    if(m.drink){
      sheet.querySelectorAll("#tempOpts .opt").forEach(b=>b.onclick=()=>{temp=b.dataset.t;note=noteIn.value;draw();});
      sheet.querySelectorAll("#sweetOpts .opt").forEach(b=>b.onclick=()=>{sweet=b.dataset.s;note=noteIn.value;draw();});
    }
    sheet.querySelector("#inc").onclick=()=>{qty++;note=noteIn.value;draw();};
    sheet.querySelector("#dec").onclick=()=>{if(qty>1){qty--;note=noteIn.value;draw();}};
    sheet.querySelector("#addBtn").onclick=()=>{addToCart(m,{temp,sweet,note,qty});closeSheet();};
  }
  document.body.appendChild(sheet);draw();
}
function addToCart(m,{temp,sweet,note,qty}){
  const key=[m.id,temp,sweet,note].join("|");
  const ex=cart.find(c=>c.key===key);
  if(ex)ex.qty+=qty; else cart.push({key,id:m.id,nm:m.nm,pr:m.pr,qty,temp,sweet,note});
  syncBar();renderMenu();toast(`เพิ่ม ${m.nm} แล้ว`);
}
function cartCount(){return cart.reduce((s,c)=>s+c.qty,0);}
function cartTotal(){return cart.reduce((s,c)=>s+c.qty*c.pr,0);}
const bar=document.getElementById("cartbar");
function syncBar(){
  const n=cartCount();bar.classList.toggle("hidden",n===0);
  document.getElementById("cbCount").textContent=n;
  document.getElementById("cbTotal").textContent="฿"+cartTotal();
}
document.getElementById("openCart").onclick=openCart;
function openCart(){
  closeSheet();sheet=document.createElement("div");sheet.className="sheet-wrap";
  function rows(){
    return cart.map((c,i)=>{
      const opt=[c.temp,c.sweet].filter(Boolean).join(" · ");
      return `<div class="crow"><div class="info"><div class="cnm">${c.nm}</div>
        ${opt?`<div class="copt">${esc(opt)}</div>`:""}${c.note?`<div class="cnote">📝 ${esc(c.note)}</div>`:""}</div>
        <div class="cside"><div class="mono">฿${c.pr*c.qty}</div>
        <div class="stepper"><button class="sbtn" data-dec="${i}" aria-label="ลด">−</button><span class="mono">${c.qty}</span><button class="sbtn" data-inc="${i}" aria-label="เพิ่ม">+</button></div></div></div>`;
    }).join("");
  }
  function draw(){
    sheet.innerHTML=`<div class="sheet"><div class="sheet-head"><h2>ตะกร้า · โต๊ะ ${table||"—"}</h2><button class="x" aria-label="ปิด">×</button></div>
      <div class="sheet-body">
        ${cart.length?rows():'<p style="text-align:center;color:var(--ink-soft);padding:40px 0">ยังไม่มีรายการ</p>'}
        ${cart.length?`<div style="margin-top:16px"><div class="sumrow"><span>ยอดรวม (${cartCount()} รายการ)</span><span class="mono">฿${cartTotal()}</span></div>
        <div class="sumrow total"><span>ทั้งหมด</span><span class="mono">฿${cartTotal()}</span></div></div>
        <button class="cta" id="placeBtn"><span>ยืนยันสั่งอาหาร</span><span class="mono">฿${cartTotal()}</span></button>`:""}
        <button class="cta ghost" id="callStaff" style="margin-top:10px">เรียกพนักงาน</button>
      </div></div>`;
    sheet.querySelector(".x").onclick=closeSheet;
    sheet.onclick=e=>{if(e.target===sheet)closeSheet();};
    sheet.querySelectorAll("[data-inc]").forEach(b=>b.onclick=()=>{cart[b.dataset.inc].qty++;syncBar();draw();});
    sheet.querySelectorAll("[data-dec]").forEach(b=>b.onclick=()=>{const i=b.dataset.dec;cart[i].qty--;if(cart[i].qty<=0)cart.splice(i,1);syncBar();renderMenu();cart.length?draw():closeSheet();});
    const pb=sheet.querySelector("#placeBtn");if(pb)pb.onclick=placeOrder;
    sheet.querySelector("#callStaff").onclick=()=>{toast("เรียกพนักงานแล้ว กำลังไปที่โต๊ะ "+(table||"—"));};
  }
  document.body.appendChild(sheet);draw();
}
let placing=false;
function placeOrder(){
  if(placing) return; placing=true;            // กันกดซ้ำ
  const orderNo="MF"+Math.floor(1000+Math.random()*9000);
  const total=cartTotal(),n=cartCount();
  if(n===0){ placing=false; return; }
  const items=cart.map(c=>({id:c.id,nm:c.nm,pr:c.pr,qty:c.qty,temp:c.temp||null,sweet:c.sweet||null,note:c.note||""}));
  const order={orderNo,table:String(table||"—"),items,count:n,total,status:"received",
    createdAt: window.__configured ? firebase.database.ServerValue.TIMESTAMP : Date.now()};
  // ===== ส่งออเดอร์เข้า Firebase (หน้าครัวจะเห็นทันที) =====
  let orderRef=null;
  if(window.__db){
    try{
      orderRef=window.__db.ref("orders").push();
      orderRef.set(order).catch(err=>{console.error("ส่งออเดอร์ไม่สำเร็จ:",err);const h=document.getElementById("statusHint");if(h)h.textContent="⚠️ ส่งออเดอร์ไม่สำเร็จ — กรุณาแจ้งพนักงาน";});
    }catch(e){ console.error("ส่งออเดอร์ไม่สำเร็จ:",e); orderRef=null; }
  }
  cart=[];syncBar();closeSheet();
  showOrderStatus(orderNo,n,total,orderRef);
  placing=false;
}
function showOrderStatus(orderNo,n,total,orderRef){
  const t=String(table||"—");
  document.querySelector(".app").innerHTML=`<div class="done">
    <div class="check">✓</div>
    <div style="font-size:21px;font-weight:600">ส่งออเดอร์แล้ว!</div>
    <div style="color:var(--ink-soft);margin-top:6px">ออเดอร์ <b class="mono">#${orderNo}</b> · โต๊ะ ${t}</div>
    <div style="color:var(--ink-soft);font-size:14px;margin-top:2px">${n} รายการ · รวม <span class="mono">฿${total}</span></div>
    <div class="steps" id="statusSteps"></div>
    <div id="statusHint" style="color:var(--ink-soft);font-size:12.5px;margin-top:2px"></div>
    <button class="cta ghost" style="max-width:260px;margin:28px auto 0" onclick="location.href='?table=${table||''}'">กลับไปหน้าเมนู</button>
  </div>`;
  renderStatusSteps("received",t);
  const hint=document.getElementById("statusHint");
  if(orderRef){
    if(hint) hint.textContent="● อัปเดตสถานะจากครัวแบบเรียลไทม์";
    orderRef.on("value",snap=>{
      if(!snap.exists()){ renderStatusSteps("cancelled",t); return; }
      renderStatusSteps(snap.child("status").val()||"received",t);
    });
  }else if(hint){
    hint.textContent = window.__configured
      ? "เชื่อมต่อครัวไม่ได้ชั่วคราว — แจ้งพนักงานได้เลย"
      : "โหมดเดโม · ยังไม่ได้ตั้งค่า Firebase (ดู README) — ออเดอร์ยังไม่ถูกส่งไปครัว";
  }
}
function renderStatusSteps(status,t){
  const el=document.getElementById("statusSteps"); if(!el) return;
  if(status==="cancelled"){
    el.innerHTML='<div class="step"><span class="sdot" style="background:#F3D9D2;color:#A33">✕</span><span style="font-weight:600;color:#A33">ออเดอร์ถูกยกเลิก — กรุณาติดต่อพนักงาน</span></div>';
    const h=document.getElementById("statusHint"); if(h) h.textContent="";
    return;
  }
  const idx = status==="preparing"?1 : (status==="served"||status==="done")?2 : 0; // ขั้นที่กำลังทำอยู่
  const served = idx===2;
  const labels=["ร้านรับออเดอร์แล้ว","กำลังเตรียม · ประมาณ 10–15 นาที", served?"เสิร์ฟแล้ว ขอบคุณครับ 🙏":"เสิร์ฟที่โต๊ะ "+t];
  const waitIcons=["✓","⏳","🔔"];
  let html="";
  for(let i=0;i<3;i++){
    let cls,sym;
    if(served||i<idx){ cls="done"; sym="✓"; }
    else if(i===idx){ cls="now"; sym="●"; }
    else { cls="wait"; sym=waitIcons[i]; }
    let style="";
    if(served&&i===2) style=' style="font-weight:600;color:var(--ok)"';
    else if(i===idx&&!served) style=' style="font-weight:500"';
    else if(i>idx&&!served) style=' style="color:var(--ink-soft)"';
    html+=`<div class="step"><span class="sdot ${cls}">${sym}</span><span${style}>${labels[i]}</span></div>`;
  }
  el.innerHTML=html;
}
let toastT;
function toast(msg){const t=document.getElementById("toast");if(!t)return;t.textContent=msg;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),1800);}
renderMenu();syncBar();
if(!window.__configured){
  console.warn("Modern Frame: ยังไม่ได้ตั้งค่า Firebase — รันโหมดเดโม ออเดอร์จะไม่ถูกส่งไปครัว (ดู README + firebase-config.js)");
  const b=document.createElement("div");
  b.className="demo-note";
  b.textContent="โหมดเดโม · ยังไม่ได้ตั้งค่า Firebase — ออเดอร์ยังไม่ถูกส่งไปครัวจริง (ดู README)";
  document.body.insertBefore(b,document.body.firstChild);
}
</script>
</body>
